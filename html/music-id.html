// Кеширование аудио через Cache API (исправленная версия)
// Кеширование аудио по musicId (а не по presigned URL)
const CACHE_NAME = 'audio-cache-v2';

// Сохранение аудио в кеш по musicId
async function cacheAudioById(musicId, audioBlob) {
    try {
        const cache = await caches.open(CACHE_NAME);
        const cacheKey = `/audio/${musicId}`; // Статический ключ
        
        const response = new Response(audioBlob, {
            status: 200,
            statusText: 'OK',
            headers: {
                'Content-Type': 'audio/mpeg',
                'Content-Length': audioBlob.size.toString(),
                'Cache-Control': 'max-age=31536000',
                'X-Music-Id': musicId
            }
        });
        
        await cache.put(cacheKey, response);
        console.log(`Аудио закешировано по ID: ${musicId}, размер: ${audioBlob.size} bytes`);
        return true;
    } catch (error) {
        console.error('Ошибка кеширования:', error);
        return false;
    }
}

// Получение аудио из кеша по musicId
async function getCachedAudioById(musicId) {
    try {
        const cache = await caches.open(CACHE_NAME);
        const cacheKey = `/audio/${musicId}`;
        const cachedResponse = await cache.match(cacheKey);
        
        if (cachedResponse && cachedResponse.ok) {
            const blob = await cachedResponse.blob();
            if (blob && blob.size > 0) {
                console.log(`Аудио загружено из кеша по ID: ${musicId}, размер: ${blob.size} bytes`);
                return blob;
            }
        }
        return null;
    } catch (error) {
        console.error('Ошибка чтения кеша:', error);
        return null;
    }
}

// Загрузка аудио с кешированием по ID
async function loadAudioWithCache(musicId, presignedUrl) {
    // 1. Пробуем получить из кеша по musicId
    const cachedBlob = await getCachedAudioById(musicId);
    
    if (cachedBlob && cachedBlob.size > 0) {
        // Создаем локальный URL из закешированного blob
        const blobUrl = URL.createObjectURL(cachedBlob);
        return blobUrl;
    }
    
    // 2. Если в кеше нет — загружаем из сети
    console.log(`Загрузка аудио из сети для ID: ${musicId}`);
    
    const response = await fetch(presignedUrl);
    if (!response.ok) {
        throw new Error(`Ошибка загрузки: ${response.status}`);
    }
    
    // Получаем полный blob
    const audioBlob = await response.blob();
    
    if (!audioBlob || audioBlob.size === 0) {
        throw new Error('Получен пустой файл');
    }
    
    console.log(`Загружен файл из сети: ${audioBlob.size} bytes, тип: ${audioBlob.type}`);
    
    // 3. Сохраняем в кеш по musicId
    await cacheAudioById(musicId, audioBlob);
    
    // 4. Создаем локальный URL
    const blobUrl = URL.createObjectURL(audioBlob);
    return blobUrl;
}

// Очистка кеша по ID (если нужно обновить файл)
async function clearAudioCacheById(musicId) {
    try {
        const cache = await caches.open(CACHE_NAME);
        const cacheKey = `/audio/${musicId}`;
        await cache.delete(cacheKey);
        console.log(`Кеш очищен для ID: ${musicId}`);
    } catch (error) {
        console.error('Ошибка очистки кеша:', error);
    }
}

// Просмотр кеша (для отладки)
async function inspectCache() {
    const cache = await caches.open(CACHE_NAME);
    const keys = await cache.keys();
    
    console.log(`В кеше ${keys.length} записей:`);
    for (const request of keys) {
        const response = await cache.match(request);
        const blob = await response.clone().blob();
        console.log(`  - ${request.url} -> размер: ${blob.size} bytes`);
    }
    return keys.length;
}

        // Добавление в историю прослушиваний (POST /listening-history)
        async function addToListeningHistory(musicId) {
            try {
                console.log(`Добавление трека ${musicId} в историю прослушиваний`);
                
                const response = await fetch(`${apiBaseUrl}/listening-history`, {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ musicID: musicId }),
                    credentials: 'include'
                });
                
                if (response.ok) {
                    console.log(`Трек ${musicId} успешно добавлен в историю`);
                    return true;
                } else if (response.status === 401 || response.status === 403) {
                    console.log('Пользователь не авторизован, история не сохранена');
                    return false;
                } else {
                    console.error('Ошибка добавления в историю:', response.status);
                    return false;
                }
            } catch (error) {
                console.error('Ошибка при добавлении в историю:', error);
                return false;
            }
        }

        // Воспроизведение музыки через presigned URL
        // Хранилище для текущего проигрываемого аудио
let currentPlayingAudio = null;

async function playMusic(musicId, musicName, artistName, seekTime = 0) {
    try {
        // === Останавливаем старый трек ===
        if (currentPlayingAudio) {
            console.log('Останавливаем старый трек');
            currentPlayingAudio.pause();
            currentPlayingAudio = null;
        }
        
        if (audioElement) {
            audioElement.pause();
            audioElement = null;
        }
        
        showNotification(`🎵 Загрузка "${musicName}"...`, 'info');
        
        const added = await addToListeningHistory(musicId);
        if (added) {
            showNotification(`🎵 "${musicName}" добавлен в историю прослушиваний`, 'info');
        }
        
        const presignedUrl = await getPresignedUrl(musicId);
        
        if (!presignedUrl) {
            throw new Error('Presigned URL не получен от сервера');
        }
        
        // === ЗАГРУЗКА С КЕШИРОВАНИЕМ ===
        // Пробуем получить из кеша по musicId
        let blobUrl = null;
        const cachedBlob = await getCachedAudioById(musicId);
        
        if (cachedBlob && cachedBlob.size > 0) {
            // Используем закешированный blob
            blobUrl = URL.createObjectURL(cachedBlob);
            console.log(`Используем кеш для трека ${musicId}`);
        } else {
            // Загружаем из сети
            console.log(`Загружаем из сети трек ${musicId}`);
            const response = await fetch(presignedUrl);
            if (!response.ok) {
                throw new Error(`Ошибка загрузки: ${response.status}`);
            }
            const audioBlob = await response.blob();
            if (!audioBlob || audioBlob.size === 0) {
                throw new Error('Получен пустой файл');
            }
            // Сохраняем в кеш
            await cacheAudioById(musicId, audioBlob);
            blobUrl = URL.createObjectURL(audioBlob);
        }
        // === КОНЕЦ БЛОКА КЕШИРОВАНИЯ ===
        
        // Создаём новый аудио элемент
        const newAudio = new Audio(blobUrl);
        audioElement = newAudio;
        currentPlayingAudio = newAudio;
        currentPresignedUrl = blobUrl;
        
        // Сохраняем глобальные переменные
        window.currentMusicId = musicId;
        window.currentMusicName = musicName;
        window.currentArtistName = artistName;
        window.audioElement = newAudio;
        
        // Обновляем UI на основной странице
        const trackNameElem = document.getElementById('trackNamePlayer');
        const trackArtistElem = document.getElementById('trackArtistPlayer');
        if (trackNameElem) trackNameElem.textContent = musicName;
        if (trackArtistElem) trackArtistElem.textContent = artistName || 'Неизвестный исполнитель';
        
        // Настройка обработчиков
        setupPlayerEventListeners();
        initVolumeSync();
        
        // Синхронизация с глобальным плеером
        newAudio.addEventListener('play', () => {
            if (globalPlayerWindow && !globalPlayerWindow.closed) {
                globalPlayerWindow.syncWithParent();
            }
        });
        
        newAudio.addEventListener('pause', () => {
            if (globalPlayerWindow && !globalPlayerWindow.closed) {
                globalPlayerWindow.syncWithParent();
            }
        });
        
        newAudio.addEventListener('timeupdate', () => {
            if (globalPlayerWindow && !globalPlayerWindow.closed) {
                globalPlayerWindow.syncWithParent();
            }
        });
        
        newAudio.addEventListener('ended', () => {
            if (repeatEnabled) {
                newAudio.currentTime = 0;
                newAudio.play();
            } else {
                currentPlayingAudio = null;
            }
            if (globalPlayerWindow && !globalPlayerWindow.closed) {
                globalPlayerWindow.syncWithParent();
            }
        });
        
        if (seekTime > 0) {
            newAudio.currentTime = seekTime;
        }
        
        await newAudio.load();
        await newAudio.play();
        
        // Принудительно обновляем информацию в глобальном плеере
        setTimeout(() => {
            if (globalPlayerWindow && !globalPlayerWindow.closed) {
                updateGlobalPlayerInfo();
            }
        }, 100);
        
        showNotification(`🎵 Воспроизведение: ${musicName}`, 'info');
        
    } catch (error) {
        console.error('Ошибка воспроизведения:', error);
        showNotification(`Не удалось воспроизвести "${musicName}": ${error.message}`, 'error');
        currentPlayingAudio = null;
    }
}
// Функция для остановки любого текущего воспроизведения
function stopAllTracks() {
    if (currentPlayingAudio) {
        currentPlayingAudio.pause();
        currentPlayingAudio = null;
    }
    if (audioElement) {
        audioElement.pause();
        audioElement = null;
    }
    if (window.audioElement) {
        window.audioElement.pause();
        window.audioElement = null;
    }
    if (currentPresignedUrl && currentPresignedUrl.startsWith('blob:')) {
        URL.revokeObjectURL(currentPresignedUrl);
        currentPresignedUrl = null;
    }
}

        // Добавление/удаление из избранного (POST/DELETE /favor)
        async function toggleFavor(musicId, musicName) {

            try {
                const response = await fetch(`${apiBaseUrl}/favor`, {

                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ musicID: musicId }),
                    credentials: 'include'
                });
                
                if (response.ok) {
                    favorStatus = !favorStatus;
                    updateFavorButton();

                } else if (response.status === 401 || response.status === 403) {
                    showNotification('Пожалуйста, войдите в систему', 'error');
                } else {
                    throw new Error('Ошибка при выполнении операции');

                return;
            }
            
            showLoading();
            
            try {

                });
                
                console.log('Статус ответа /music/${musicId}:', response.status);
                
                if (response.status === 404) {
                    showError('Трек не найден');
                    return;
                }
                
                if (!response.ok) {
                    throw new Error(`HTTP ошибка! Статус: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('Получены данные трека:', data);
                
                let music = null;
                let musicFavor = null;
                
                if (data && data.music) {
                    music = data.music;
                    musicFavor = data.music_favor;
                } else if (data && data.GetMusicResponse) {
                    music = data.GetMusicResponse;
                } else {

                if (musicFavor && musicFavor.music_id) {

                showError(error.message);
            } finally {

            }
        }

        function formatDuration(seconds) {

function openGlobalPlayer() {
    if (globalPlayerWindow && !globalPlayerWindow.closed) {
        globalPlayerWindow.focus();
        // Принудительно обновляем информацию
        if (globalPlayerWindow.setTrackInfo) {
            var currentTime = audioElement ? audioElement.currentTime : 0;
            var duration = audioElement ? audioElement.duration : 0;
            var isPlaying = audioElement ? !audioElement.paused : false;
            var volume = audioElement ? audioElement.volume : 1;
            
            globalPlayerWindow.setTrackInfo(
                currentMusicId,
                currentMusicName,
                currentArtistName,
                currentTime,
                duration,
                isPlaying,
                volume
            );
        }
        return;
    }
    
    globalPlayerWindow = window.open('player-window.html', 'MusicPlayer', 'width=450,height=420,resizable=yes');
    
    if (globalPlayerWindow) {
        // Ждем полной загрузки окна
        var checkReady = setInterval(function() {
            if (globalPlayerWindow && globalPlayerWindow.initPlayer) {
                clearInterval(checkReady);
                
                // Передаем все данные при инициализации
                var currentTime = audioElement ? audioElement.currentTime : 0;
                var duration = audioElement ? audioElement.duration : 0;
                var isPlaying = audioElement ? !audioElement.paused : false;
                var volume = audioElement ? audioElement.volume : 1;
                
                globalPlayerWindow.initPlayer(
                    window,
                    currentMusicId,
                    currentMusicName,
                    currentArtistName,
                    currentTime,
                    duration,
                    isPlaying,
                    volume
                );
            }
        }, 100);
        
        setTimeout(function() {
            clearInterval(checkReady);
        }, 5000);
    }
}
