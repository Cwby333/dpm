<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация в приложении</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e1e1;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .response-container {
            margin-top: 30px;
            padding: 20px;
            border-radius: 6px;
            background: #f8f9fa;
            border-left: 4px solid #667eea;
        }

        .response-title {
            font-size: 14px;
            font-weight: 600;
            color: #555;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .response-content {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: #333;
            word-wrap: break-word;
            max-height: 200px;
            overflow-y: auto;
            padding: 10px;
            background: white;
            border-radius: 4px;
        }

        .error {
            border-left-color: #dc3545;
        }

        .success {
            border-left-color: #28a745;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Регистрация</h1>
        
        <form id="registerForm">
            <div class="form-group">
                <label for="username">Имя пользователя *</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    required 
                    minlength="3"
                    maxlength="50"
                    placeholder="Введите имя пользователя"
                >
            </div>

            <div class="form-group">
                <label for="email">Email *</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    required 
                    placeholder="Введите email"
                >
            </div>

            <div class="form-group">
                <label for="password">Пароль *</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    required 
                    minlength="6"
                    placeholder="Введите пароль"
                >
                <small style="color: #666; font-size: 12px; margin-top: 5px; display: block;">
                    Минимум 6 символов
                </small>
            </div>

            <button type="submit" id="submitBtn">
                <span id="buttonText">Зарегистрироваться</span>
            </button>
        </form>

        <div class="response-container" id="responseContainer" style="display: none;">
            <div class="response-title">Ответ сервера:</div>
            <div class="response-content" id="responseContent"></div>
        </div>
    </div>

    <script>
        const form = document.getElementById('registerForm');
        const submitBtn = document.getElementById('submitBtn');
        const buttonText = document.getElementById('buttonText');
        const responseContainer = document.getElementById('responseContainer');
        const responseContent = document.getElementById('responseContent');

        // Функция для отображения ответа
        function displayResponse(data, isError = false) {
            responseContainer.style.display = 'block';
            responseContainer.classList.remove('error', 'success');
            responseContainer.classList.add(isError ? 'error' : 'success');
            
            if (typeof data === 'string') {
                responseContent.textContent = data;
            } else {
                responseContent.textContent = JSON.stringify(data, null, 2);
            }
        }

        // Функция для показа загрузки
        function setLoading(isLoading) {
            if (isLoading) {
                submitBtn.disabled = true;
                buttonText.innerHTML = '<span class="loading"></span> Отправка...';
            } else {
                submitBtn.disabled = false;
                buttonText.textContent = 'Зарегистрироваться';
            }
        }

        // Обработчик отправки формы
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Собираем данные формы
            const formData = {
                username: document.getElementById('username').value.trim(),
                email: document.getElementById('email').value.trim(),
                password: document.getElementById('password').value
            };

            // Простая валидация на клиенте
            if (formData.username.length < 3) {
                displayResponse('Имя пользователя должно содержать минимум 3 символа', true);
                return;
            }

            if (formData.password.length < 6) {
                displayResponse('Пароль должен содержать минимум 6 символов', true);
                return;
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(formData.email)) {
                displayResponse('Введите корректный email адрес', true);
                return;
            }

            setLoading(true);

            try {
                // Отправляем запрос на сервер
                const response = await fetch('http://localhost:3003/register', {
                    method: 'POST',
                    mode: 'cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });

                let responseData;
                const contentType = response.headers.get('content-type');
                
                if (contentType && contentType.includes('application/json')) {
                    responseData = await response.json();
                } else {
                    responseData = await response.text();
                }

                // Формируем объект с полной информацией об ответе
                const fullResponse = {
                    status: response.status,
                    statusText: response.statusText,
                    data: responseData
                };

                displayResponse(fullResponse, !response.ok);

            } catch (error) {
                displayResponse({
                    error: true,
                    message: 'Ошибка соединения с сервером: ' + error.message
                }, true);
            } finally {
                setLoading(false);
            }
        });

        // Добавляем обработчики для сброса стилей при изменении полей
        ['username', 'email', 'password'].forEach(id => {
            document.getElementById(id).addEventListener('input', () => {
                if (responseContainer.style.display === 'block') {
                    responseContainer.style.display = 'none';
                }
            });
        });

        // Добавляем обработчик для показа/скрытия пароля (опционально)
        const passwordInput = document.getElementById('password');
        const togglePassword = document.createElement('button');
        togglePassword.type = 'button';
        togglePassword.textContent = '👁';
        togglePassword.style.cssText = `
            position: absolute;
            right: 10px;
            top: 35px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            padding: 0;
            width: auto;
        `;
        
        const passwordGroup = document.querySelector('.form-group:has(#password)');
        passwordGroup.style.position = 'relative';
        passwordGroup.appendChild(togglePassword);

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            togglePassword.textContent = type === 'password' ? '👁' : '👁‍🗨';
        });
    </script>
</body>
</html>
