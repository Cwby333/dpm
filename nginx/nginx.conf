user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /run/nginx.pid;


events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"' 'Headers: $http_cookie';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  65;

    #gzip  on;

    include /etc/nginx/conf.d/*.conf;

    charset utf-8;

    types {
        text/html                             html htm shtml;
        text/css                              css;
        text/xml                              xml;
        text/javascript                       js;
        application/json                      json;
    }

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name 172.17.110.58;
        root /usr/share/nginx/html;

        charset utf-8;

        ssl_certificate /nginx.crt;
        ssl_certificate_key /nginx.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        add_header 'Access-Control-Allow-Origin' 'https://172.17.110.58' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Accept, Content-Type, Content-Length, Authorization, Access-Token, Refresh-Token' always;

        location /music {
            proxy_pass http://app:3003/music;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Cookie $http_cookie;
            proxy_pass_header Set-Cookie;
            
            # Проксируем CORS заголовки
            proxy_pass_header 'Access-Control-Allow-Origin';
            proxy_pass_header 'Access-Control-Allow-Credentials';
        }

        location /favor {
            proxy_pass http://app:3003/favor;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_set_header Cookie $http_cookie;
            proxy_pass_header Set-Cookie;
            proxy_pass_header Cookie;
        }

        location /listening-history {
            proxy_pass http://app:3003/listening-history;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_set_header Cookie $http_cookie;
            proxy_pass_header Set-Cookie;
            proxy_pass_header Cookie;
        }

        location /likes {
            proxy_pass http://app:3003/likes;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_set_header Cookie $http_cookie;
            proxy_pass_header Set-Cookie;
            proxy_pass_header Cookie;
        }

        location /profile {
            proxy_pass http://app:3003/profile;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_set_header Cookie $http_cookie;
            proxy_pass_header Set-Cookie;
            proxy_pass_header Cookie;
        }

        location /login {
            proxy_pass http://app:3003/login;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_set_header Cookie $http_cookie;
            proxy_pass_header Set-Cookie;
            proxy_pass_header Cookie;
        }

        location /logout {
            proxy_pass http://app:3003/logout;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_set_header Cookie $http_cookie;
            proxy_pass_header Set-Cookie;
            proxy_pass_header Cookie;
        }

        location /register {
            proxy_pass http://app:3003/register;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /ping {
            proxy_pass http://app:3003/ping;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /music/play {
            proxy_pass http://app:3003/music/play;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_set_header Cookie $http_cookie;
            proxy_pass_header Set-Cookie;
            proxy_pass_header Cookie;
        }

        location /music/like {
            proxy_pass http://app:3003/music/like;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_set_header Cookie $http_cookie;
            proxy_pass_header Set-Cookie;
            proxy_pass_header Cookie;
        }

        location /music/upload {
            client_max_body_size 50M;
            proxy_pass http://app:3003/music/upload;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_set_header Cookie $http_cookie;
            proxy_pass_header Set-Cookie;
            proxy_pass_header Cookie;
        }

        location ~ \.html$ {
            add_header Content-Type "text/html; charset=utf-8";
        }

        location ~ \.(css|js|html|txt)$ {
            add_header Content-Type $content_type;
            add_header Content-Type "text/html; charset=utf-8" always;
        }

        location / {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' 'https://172.17.110.58';
                add_header 'Access-Control-Allow-Credentials' 'true';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Accept, Content-Type, Content-Length, Authorization, Access-Token, Refresh-Token';
                add_header 'Access-Control-Max-Age' 0;
                add_header 'Content-Type' 'text/plain charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            try_files $uri $uri.html $uri/ =404;
        }
    }
}