openapi: 3.0.1
info:
  title: 'Music microservice'
  description: 'Music microservice HTTP API for Mute project'
  contact:
    name: 'Mute project'
    email: 'muteproject@gmail.com'
  version: 1.0.0
# servers:
#   - url: "https://music-microservice.mute-project/api/v1"
#     description: "Base url"
paths:
  /favor:
    description: "Actions with user's favor"
    get:
      description: "Get user's favor"
      operationId: "getFavor"
      parameters:
        - name: Access-Token
          in: cookie
          required: true
          allowEmptyValue: false
          deprecated: false
          schema:
            type: string
      responses:
        200:
          description: "Success"
          $ref: "#/components/responses/GetMusic"
        500:
          description: "Server error"
          content:
            application/json:
              schema:
                type: string
    post:
      description: "Add music to user's favor"
      operationId: "addFavor"
      parameters:
        - name: Access-Token
          in: cookie
          required: true
          allowEmptyValue: false
          deprecated: false
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - musicID
              properties:
                musicID:
                  type: string
      responses:
        200:
          description: "Success"
          content:
            application/json:
              schema:
                type: string
        500:
          description: "Server error"
          content:
            application/json:
              schema:
                type: string
    delete:
      description: "Delete music to user's favor"
      operationId: "deleteFavor"
      parameters:
        - name: Access-Token
          in: cookie
          required: true
          allowEmptyValue: false
          deprecated: false
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - musicID
              properties:
                musicID:
                  type: string
      responses:
        200:
          description: "Success"
          content:
            application/json:
              schema:
                type: string
        500:
          description: "Server error"
          content:
            application/json:
              schema:
                type: string

  /listening-history:
    description: "Actions with user's listening history"
    get:
      description: "Get listening history"
      operationId: "getLH"
      parameters:
        - name: Access-Token
          in: cookie
          required: true
          allowEmptyValue: false
          deprecated: false
          schema:
            type: string
      responses:
        200:
          description: "Success"
          $ref: "#/components/responses/GetListeningHistory"
        500:
          description: "Server error"
          content:
            application/json:
              schema:
                type: string
    delete:
      description: "Delete listening from listening history"
      operationId: "deleteListeningFromLH"
      parameters:
        - name: Access-Token
          in: cookie
          required: true
          allowEmptyValue: false
          deprecated: false
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - music_id
              properties:
                music_id:
                  type: string
                listening_date:
                  type: string
                  format: date-time
      responses:
        200:
          description: "Success"
          content:
            application/json:
              schema:
                type: string
        500:
          description: "Server error"
          content:
            application/json:
              schema:
                type: string
    post:
      description: "Add music in listening history"
      operationId: "addListeningToLH"
      parameters:
        - name: Access-Token
          in: cookie
          required: true
          allowEmptyValue: false
          deprecated: false
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - musicID
              properties:
                musicID:
                  type: string
      responses:
        200:
          description: "Success"
          content:
            application/json:
              schema:
                type: string
        500:
          description: "Server error"
          content:
            application/json:
              schema:
                type: string
  /music:
    summary: "Act with music"
    get:
      summary: "Get all music"
      operationId: "getAllMusic"
      parameters:
        - name: Access-Token
          in: cookie
          schema:
            type: string
          required: false
      responses:
        200:
          description: "Success"
          $ref: "#/components/responses/GetMusic"
        500:
          description: "Server error"
          content:
            application/json:
              schema:
                type: string
  /music/{musicID}:
    summary: "Action with one music"
    get:
      description: "Get music by ID"
      operationId: "getMusic"
      parameters:
        - name: musicID
          in: path
          description: "music ID"
          required: true
          deprecated: false
          allowEmptyValue: false
          schema:
            type: string
      responses:
        200:
          description: "Success"
          $ref: "#/components/responses/GetMusicResponse"
        500:
          description: 'Server error'
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  /register:
    summary: "Register in webapp"
    post:
      description: "User post his username, email, password and app register him in system"
      operationId: "register"
      requestBody:
        $ref: "#/components/requestBodies/Register"
      responses:
        200:
          description: "Success"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        500:
          description: 'Server error'
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  /login:
    summary: 'Login in webapp'
    post:
      description: 'User post his username and password and get token for authentication'
      operationId: 'login'
      requestBody:
        $ref: '#/components/requestBodies/Login'
      responses:
        200:
          description: 'Success'
          headers:
            Access-Token:
              $ref: "#/components/headers/AccessToken"
            Refresh-Token:
              $ref: "#/components/headers/RefreshToken"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        500:
          description: 'Server error'
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  /ping:
    summary: 'Check health service'
    get:
      responses:
        200:
          description: 'Success'
          content:
            application/json:
              schema:
                type: string
        500:
          description: 'Server error'
          content:
            application/json:
              schema:
                type: string

