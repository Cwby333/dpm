  headers:
    AccessToken:
      content:
        application/json:
          schema:
            type: string
    RefreshToken:
      content:
        application/json:
          schema:
            type: string

  schemas:
    ListeningHistoryResponse:
      type: object
      properties:
        music_id:
          type: string
        music_name:
          type: string
        music_cover:
          type: string
        music_likes:
          type: integer
        music_duration:
          type: integer
        song_url:
          type: string
        uploader_id:
          type: string
        uploader_username:
          type: string
        listening_date:
          type: string
          format: date-time

    Music:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        uploader_id:
          type: string
        likes:
          type: integer
        duration_seconds:
          type: integer
        music_cover:
          type: string
        song_url:
          type: string
      required:
        - id
        - name
        - uploader_id
        - likes
        - duration_seconds
        - cover
        - song_url