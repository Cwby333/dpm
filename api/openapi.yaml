components:
  responses:
    GetListeningHistory:
      description: "Get listening history"
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "#/components/schemas/ListeningHistoryResponse"
    GetMusic:
      description: "Get all music"
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "#/components/schemas/Music"
    GetMusicResponse:
      description: "Object that will be returned by /product/{productID} GET operation"
      content:
        application/json:
          schema:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              uploader_id:
                type: string
              likes:
                type: integer
              duration_seconds:
                type: integer
              music_cover:
                type: string
              song_url:
                type: string
  requestBodies:
    Register:
      description: 'Req body for /register'
      content:
        application/json:
          schema:
            type: object
            required:
              - username
                password
                email
            properties:
              username:
                type: string
              password:
                type: string
              email:
                type: string
    Login:
      description: 'Req body for /login'
      content:
        application/json:
          schema:
            type: object
            required:
              - username
                password
            properties:
              username:
                type: string
              password:
                type: string
